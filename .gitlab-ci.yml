image: node:22

pages:
  stage: build
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  variables:
    # The official team wiki is published at https://2026.igem.wiki/vis/.
    # Next.js uses this value to prefix links and bundled assets with /vis.
    IGEM_TEAM_SLUG: "vis"
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint
    - npm run build
    - cp -a out/. public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
